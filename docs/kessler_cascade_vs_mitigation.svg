<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" role="img" aria-labelledby="chart-title chart-desc">
  <title id="chart-title">Debris population over time: cascade versus mitigation</title>
  <desc id="chart-desc">Two curves of orbital debris in a high-altitude shell over sixty years. Without intervention the population runs away into a Kessler cascade. With a small debris-removal fleet deployed early, it levels off and the catastrophe is avoided.</desc>
  <rect width="680" height="380" fill="#0a0a0a"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line x1="85" y1="330" x2="625" y2="330" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="85" y1="330" x2="85" y2="50" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="245" y1="255" x2="245" y2="330" stroke="#888780" stroke-width="0.75" stroke-dasharray="4 4"/>
  <polyline points="85,303 130,297 174,289 219,278 263,261 308,239 353,206 397,165 442,116 477,83 504,63 522,55" fill="none" stroke="#E24B4A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="85,303 130,297 174,289 219,279 245,272 281,261 326,250 379,245 442,243 513,243 575,245 620,247" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 5"/>
  <circle cx="245" cy="272" r="3.5" fill="#1D9E75"/>
  <line x1="478" y1="86" x2="478" y2="240" stroke="#D85A30" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="92" y="44" fill="#c2c0b6" font-family="system-ui, sans-serif" font-size="12">debris in shell (N)</text>
  <text x="355" y="352" fill="#c2c0b6" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">time (years)</text>
  <text x="240" y="248" fill="#c2c0b6" font-family="system-ui, sans-serif" font-size="12" text-anchor="end">foam fleet deployed</text>
  <text x="505" y="48" fill="#c2c0b6" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">cascade</text>
  <text x="488" y="160" fill="#c2c0b6" font-family="system-ui, sans-serif" font-size="12">catastrophe avoided</text>
  <text x="560" y="232" fill="#c2c0b6" font-family="system-ui, sans-serif" font-size="12">stabilized</text>
  <line x1="110" y1="70" x2="136" y2="70" stroke="#E24B4A" stroke-width="2.5" stroke-linecap="round"/>
  <text x="144" y="74" fill="#c2c0b6" font-family="system-ui, sans-serif" font-size="12">no intervention</text>
  <line x1="110" y1="92" x2="136" y2="92" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 5"/>
  <text x="144" y="96" fill="#c2c0b6" font-family="system-ui, sans-serif" font-size="12">with foam fleet</text>
</svg>
